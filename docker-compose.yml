services:
  # ---------------------------------------------------------
  # 1. Database Service (The Secure Vault)
  # ---------------------------------------------------------
#  db:
#    image: mysql:8.0
#    container_name: capstone_mysql
#    restart: always
#    # We use env_file instead of writing passwords directly here
#    env_file:
#      - .env
#    ports:
#      - "3305:3306"
#    volumes:
#      - db_data:/var/lib/mysql
#      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
#    # This tells Docker how to check if MySQL is actually ready
#    healthcheck:
#      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
#      timeout: 20s
#      retries: 10

  # ---------------------------------------------------------
  # 2. Local AI Service (The Privacy Engine)
  # ---------------------------------------------------------
  ollama:
    image: ollama/ollama
    container_name: capstone_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull sqlcoder && wait"

  # ---------------------------------------------------------
  # 3. Python AI Agent (The Brain & WhatsApp Interface)
  # ---------------------------------------------------------
  app:
    build: .
    container_name: capstone_bot
    restart: always
    env_file:
      - .env
    # The app will wait for MySQL to pass its healthcheck before starting
    depends_on:
#      db:
#        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - .:/app

volumes:
  db_data:
  ollama_data: